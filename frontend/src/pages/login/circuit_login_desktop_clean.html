
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  .lp-page {
    min-height: 580px;
    background: #d9d9d9;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow', Arial, sans-serif;
    padding: 40px 20px;
  }

  .lp-card {
    background: #d9d9d9;
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
  }

  .lp-back {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: #333;
    align-self: flex-start;
    margin-bottom: 24px;
    padding: 0;
    line-height: 1;
  }

  .lp-title {
    font-size: 30px;
    font-weight: 700;
    color: #111;
    margin-bottom: 6px;
  }

  .lp-subtitle {
    font-size: 14px;
    color: #555;
    margin-bottom: 28px;
  }

  .lp-label {
    font-size: 13px;
    color: #333;
    margin-bottom: 6px;
    display: block;
  }

  .lp-input-wrap {
    background: #222;
    border-radius: 12px;
    padding: 0 14px;
    display: flex;
    align-items: center;
    margin-bottom: 16px;
    border: 1.5px solid transparent;
  }

  .lp-input-wrap:focus-within {
    border-color: #dc1e1e;
  }

  .lp-input-icon {
    color: #777;
    font-size: 15px;
    margin-right: 10px;
    flex-shrink: 0;
  }

  .lp-input-wrap input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #fff;
    font-family: 'Barlow', Arial, sans-serif;
    font-size: 14px;
    padding: 14px 0;
  }

  .lp-input-wrap input::placeholder { color: #555; }

  .lp-eye {
    background: none;
    border: none;
    color: #777;
    cursor: pointer;
    font-size: 16px;
    padding: 0;
    line-height: 1;
  }

  .lp-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 2px 0 22px;
    font-size: 13px;
  }

  .lp-remember {
    display: flex;
    align-items: center;
    gap: 7px;
    color: #333;
    cursor: pointer;
  }

  .lp-remember input[type="checkbox"] {
    width: 16px; height: 16px;
    accent-color: #dc1e1e;
    cursor: pointer;
  }

  .lp-forgot {
    color: #dc1e1e;
    font-weight: 600;
    text-decoration: none;
    font-size: 13px;
  }

  .lp-submit {
    width: 100%;
    background: #dc1e1e;
    color: white;
    border: none;
    border-radius: 30px;
    padding: 15px;
    font-family: 'Barlow', Arial, sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.15s;
    margin-bottom: 22px;
  }

  .lp-submit:hover { background: #b01818; }

  .lp-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
  }

  .lp-divider-line { flex: 1; height: 1px; background: #aaa; }

  .lp-divider-text {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: #777;
    white-space: nowrap;
  }

  .lp-social {
    display: flex;
    gap: 12px;
    margin-bottom: 22px;
  }

  .lp-social-btn {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    background: #1e1e1e;
    color: white;
    font-family: 'Barlow', Arial, sans-serif;
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.15s;
  }

  .lp-social-btn:hover { background: #2e2e2e; }

  .lp-register {
    font-size: 13px;
    color: #555;
    text-align: center;
  }

  .lp-register a {
    color: #dc1e1e;
    font-weight: 700;
    text-decoration: none;
  }
</style>

<div class="lp-page">
  <div class="lp-card">

    <button class="lp-back">&#8592;</button>

    <h1 class="lp-title">Iniciar sessió</h1>
    <p class="lp-subtitle">Accedeix per guardar la teva grada i preferències</p>

    <label class="lp-label">Correu electrònic</label>
    <div class="lp-input-wrap">
      <span class="lp-input-icon">&#9993;</span>
      <input type="email" placeholder="exemple@circuit.cat" />
    </div>

    <label class="lp-label">Contrasenya</label>
    <div class="lp-input-wrap">
      <span class="lp-input-icon">&#128274;</span>
      <input type="password" placeholder="••••••••" id="pwd" />
      <button class="lp-eye" onclick="var i=document.getElementById('pwd');i.type=i.type==='password'?'text':'password'">&#128065;</button>
    </div>

    <div class="lp-options">
      <label class="lp-remember">
        <input type="checkbox" /> Recordar sessió
      </label>
      <a href="#" class="lp-forgot">Has oblidat la contrasenya?</a>
    </div>

    <button class="lp-submit">Entrar &#8594;</button>

    <div class="lp-divider">
      <div class="lp-divider-line"></div>
      <span class="lp-divider-text">O CONTINUA AMB</span>
      <div class="lp-divider-line"></div>
    </div>

    <div class="lp-social">
      <button class="lp-social-btn">
        <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#EA4335" d="M5.27 9.76A7.08 7.08 0 0 1 12 4.9c1.69 0 3.21.6 4.4 1.58l3.28-3.28A11.94 11.94 0 0 0 12 1C8.02 1 4.57 3.1 2.73 6.28l2.54 3.48z"/><path fill="#34A853" d="M16.04 18.01A7.07 7.07 0 0 1 12 19.1c-2.87 0-5.33-1.71-6.53-4.2l-3.46 2.69C4.45 20.8 8.01 23 12 23c3.15 0 6.04-1.18 8.22-3.12l-4.18-1.87z"/><path fill="#FBBC05" d="M19.1 12c0-.65-.07-1.27-.18-1.87H12v3.74h3.99a3.56 3.56 0 0 1-1.55 2.31l4.18 1.87A11.94 11.94 0 0 0 19.1 12z"/><path fill="#4285F4" d="M2.73 6.28A11.88 11.88 0 0 0 1 12c0 2.01.5 3.9 1.37 5.56l3.46-2.69A7.06 7.06 0 0 1 4.9 12c0-1.01.21-1.97.57-2.76L2.73 6.28z"/></svg>
        G
      </button>
      <button class="lp-social-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        iOS
      </button>
    </div>

    <p class="lp-register">No tens compte? <a href="#">Registrar-se</a></p>

  </div>
</div>
